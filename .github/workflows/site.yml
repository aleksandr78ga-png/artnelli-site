name: Sync catalogue and publish artnelli.com

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - "scripts/sync-catalog.mjs"
      - ".github/workflows/site.yml"
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: catalogue-sync
  cancel-in-progress: false

jobs:
  sync-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Sync Telegram catalogue
        env:
          NELLI_CATALOG_BACKEND: https://artnelli-leotards.aleksandr78ga.chatgpt.site/
        run: node scripts/sync-catalog.mjs

      - name: Save catalogue changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- site/catalog-data.js site/api/live-data.js site/assets/catalog
          if git diff --cached --quiet; then
            echo "Catalogue is already current."
          else
            git commit -m "Sync Telegram catalogue"
            git push
          fi

      - name: Publish site files to gh-pages
        id: publish
        shell: bash
        run: |
          set -euo pipefail
          publish_dir="${RUNNER_TEMP}/nelli-pages"
          git fetch origin gh-pages:refs/remotes/origin/gh-pages
          git worktree add --detach "${publish_dir}" origin/gh-pages
          rsync --archive --delete \
            --exclude=".git" \
            --exclude=".github" \
            site/ "${publish_dir}/"
          git -C "${publish_dir}" config user.name "github-actions[bot]"
          git -C "${publish_dir}" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "${publish_dir}" add -A
          if git -C "${publish_dir}" diff --cached --quiet; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            echo "Published site is already current."
          else
            git -C "${publish_dir}" commit -m "Publish synchronized catalogue"
            git -C "${publish_dir}" push origin HEAD:gh-pages
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Start protected Pages deployment
        if: steps.publish.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/deploy-pages.yml/dispatches" \
            --data '{"ref":"gh-pages"}'
