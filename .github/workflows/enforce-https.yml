name: Enforce HTTPS for artnelli.com

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/enforce-https.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write

jobs:
  enforce-https:
    runs-on: ubuntu-latest
    steps:
      - name: Require HTTPS for GitHub Pages
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
            --request PUT \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
            --data '{"https_enforced":true}'
