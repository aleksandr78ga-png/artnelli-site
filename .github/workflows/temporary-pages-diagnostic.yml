name: Temporary Pages diagnostic

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/temporary-pages-diagnostic.yml

permissions:
  contents: write
  pages: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Pages configuration and live HTTPS
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          api_tmp="$(mktemp)"
          curl --fail-with-body --silent --show-error \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" > "${api_tmp}"

          python3 - "${api_tmp}" <<'PY'
          import datetime
          import json
          import socket
          import ssl
          import sys
          import urllib.request

          hostname = "artnelli.com"
          with open(sys.argv[1], encoding="utf-8") as handle:
              pages_raw = json.load(handle)

          pages_keys = (
              "status",
              "cname",
              "html_url",
              "build_type",
              "https_enforced",
              "protected_domain_state",
              "pending_domain_unverified_at",
              "https_certificate",
          )
          report = {
              "checked_at": datetime.datetime.now(datetime.timezone.utc).isoformat(),
              "pages": {key: pages_raw.get(key) for key in pages_keys},
              "tls": {"hostname": hostname},
              "urls": {},
          }

          try:
              context = ssl.create_default_context()
              with socket.create_connection((hostname, 443), timeout=15) as tcp:
                  with context.wrap_socket(tcp, server_hostname=hostname) as secure:
                      cert = secure.getpeercert()
                      report["tls"].update({
                          "authorized": True,
                          "version": secure.version(),
                          "subject_alt_names": [
                              value for kind, value in cert.get("subjectAltName", [])
                              if kind == "DNS"
                          ],
                          "not_after": cert.get("notAfter"),
                      })
          except Exception as exc:
              report["tls"].update({
                  "authorized": False,
                  "error": f"{type(exc).__name__}: {exc}",
              })

          try:
              context = ssl._create_unverified_context()
              with socket.create_connection((hostname, 443), timeout=15) as tcp:
                  with context.wrap_socket(tcp, server_hostname=hostname) as secure:
                      cert = secure.getpeercert(binary_form=True)
                      parsed = ssl._ssl._test_decode_cert("/dev/stdin") if False else None
                      report["tls"]["presented_der_bytes"] = len(cert)
          except Exception as exc:
              report["tls"]["presentation_error"] = f"{type(exc).__name__}: {exc}"

          for path in ("/", "/catalog-data.js", "/api/live-data.js"):
              url = f"https://{hostname}{path}"
              try:
                  request = urllib.request.Request(url, headers={"User-Agent": "ArtNelli-Pages-Diagnostic/1.0"})
                  with urllib.request.urlopen(request, timeout=20) as response:
                      report["urls"][path] = {
                          "ok": True,
                          "status": response.status,
                          "final_url": response.geturl(),
                          "server": response.headers.get("Server"),
                      }
              except Exception as exc:
                  report["urls"][path] = {
                      "ok": False,
                      "error": f"{type(exc).__name__}: {exc}",
                  }

          with open("pages-status.json", "w", encoding="utf-8") as handle:
              json.dump(report, handle, ensure_ascii=False, indent=2)
              handle.write("\n")
          PY

      - name: Save diagnostic result
        run: |
          set -euo pipefail
          git config user.name "Art Nelli Pages Diagnostic"
          git config user.email "actions@users.noreply.github.com"
          git add pages-status.json
          git commit -m "Record temporary Pages diagnostic"
          git push
